<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Story Clone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone-frame {
      width: 360px;
      min-height: 640px;
      background: #0a0a1a;
      border-radius: 36px;
      border: 2px solid #2a2a4a;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      position: relative;
    }

    .story-bg {
      width: 100%;
      min-height: 640px;
      background: radial-gradient(ellipse at 20% 30%, #1b1b3a 0%, #0a0a1a 60%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0.6;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.9; } }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-area {
      display: flex; gap: 3px;
      padding: 12px 14px 4px;
      z-index: 10; position: relative;
    }
    .progress-segment {
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.35);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: white; border-radius: 2px; }
    .progress-segment:first-child .progress-fill { width: 100%; }
    .progress-segment:nth-child(2) .progress-fill { width: 40%; }
    .progress-segment:nth-child(3) .progress-fill { width: 0%; }

    /* ===== HEADER ===== */
    .story-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px 10px;
      z-index: 10;
      position: relative;
    }

    /* Avatar — click to upload */
    .avatar-wrapper {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid #1877f2;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }
    .avatar-wrapper:hover::after {
      content: '📷';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .avatar-wrapper img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .avatar-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1877f2, #42a5f5);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; font-weight: bold;
    }
    #avatarInput { display: none; }

    .header-info { flex: 1; min-width: 0; }
    .header-name {
font-size: 13px; font-weight: 600; color: white;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-meta {
      font-size: 11px; color: rgba(255,255,255,0.7);
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
      white-space: nowrap; overflow: hidden;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: white; font-size: 18px; padding: 2px; opacity: 0.85;
    }
    .btn-icon:hover { opacity: 1; }

    /* ===== PHOTO CARDS ===== */
    .photos-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 4px 20px 8px;
      position: relative;
      z-index: 5;
    }

    .photo-card {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
      background: #2a5a2a;
      cursor: pointer;
    }
    .photo-card:hover .upload-hint { opacity: 1; }
    .upload-hint {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
      pointer-events: none;
    }

    .camo-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(ellipse 40px 30px at 10% 20%, #3a5a1a 0%, transparent 60%),
        radial-gradient(ellipse 60px 40px at 70% 10%, #5a7a2a 0%, transparent 60%),
        radial-gradient(ellipse 35px 50px at 30% 60%, #1a3a0a 0%, transparent 60%),
        radial-gradient(ellipse 50px 35px at 80% 70%, #4a6a1a 0%, transparent 60%),
        radial-gradient(ellipse 45px 45px at 50% 40%, #2a4a10 0%, transparent 60%),
        radial-gradient(ellipse 55px 30px at 15% 80%, #6a8a2a 0%, transparent 60%),
        radial-gradient(ellipse 30px 55px at 90% 30%, #3a5a1a 0%, transparent 60%),
        radial-gradient(ellipse 65px 25px at 55% 85%, #1a2a08 0%, transparent 60%);
      background-color: #4a6a2a;
      background-blend-mode: multiply;
    }

    .photo-placeholder {
      width: 100%;
      height: 155px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 30px;
    }

    /* Silhouette */
    .person-silhouette {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
    }
    .person-head {
      width: 42px; height: 42px;
      background: #f5c5a0;
      border-radius: 50%; position: relative; z-index: 2;
    }
    .person-hat {
      width: 52px; height: 22px;
      background: #556b2f;
      border-radius: 50% 50% 0 0 / 60% 60% 0 0;
      position: absolute; top: -14px; left: -5px; z-index: 3;
    }
    .person-hat::after {
      content: '';
position: absolute;
      bottom: -4px; left: -4px; right: -4px;
      height: 8px; background: #4a5f25;
      border-radius: 0 0 4px 4px;
    }
    .person-body {
      width: 60px; height: 80px;
      background: #556b2f;
      border-radius: 8px 8px 0 0; margin-top: 2px;
    }
    .person-hair {
      position: absolute;
      width: 44px; height: 55px;
      background: #2c1a0e;
      border-radius: 50% 50% 40% 40%;
      top: -10px; left: -1px; z-index: 1;
    }
    .peace-hand {
      position: absolute; left: 25px; top: 50%;
      transform: translateY(-50%);
      z-index: 3; font-size: 26px;
      animation: waving 1.5s ease-in-out infinite alternate;
    }
    @keyframes waving {
      from { transform: translateY(-50%) rotate(-5deg); }
      to   { transform: translateY(-50%) rotate(5deg); }
    }

    /* ===== STICKERS ===== */
    .sticker { position: absolute; z-index: 20; pointer-events: none; }
    .sticker-butterfly {
      top: 70px; right: 10px; font-size: 36px;
      animation: flutter 2s ease-in-out infinite alternate;
      filter: hue-rotate(120deg) saturate(1.5);
    }
    @keyframes flutter {
      from { transform: rotate(-8deg) scale(1); }
      to   { transform: rotate(8deg) scale(1.1); }
    }
    .sticker-flower {
      top: 285px; left: 8px; font-size: 46px;
      animation: sway 3s ease-in-out infinite alternate;
      filter: hue-rotate(180deg) saturate(2);
    }
    @keyframes sway {
      from { transform: rotate(-6deg); }
      to   { transform: rotate(6deg); }
    }
    .sticker-sparkle { font-size: 22px; animation: sparkle-pulse 1.8s ease-in-out infinite alternate; }
    @keyframes sparkle-pulse {
      from { opacity: 0.5; transform: scale(0.85); }
      to   { opacity: 1;   transform: scale(1.15); }
    }
    .sp1 { top: 110px; left: 15px; font-size: 28px; }
    .sp2 { top: 215px; right: 18px; font-size: 18px; }
    .sp3 { top: 415px; left: 20px; font-size: 24px; }
    .sp4 { top: 480px; right: 22px; font-size: 16px; }

    /* ===== FOOTER — reactions ===== */
    .story-footer {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px 4px;
      z-index: 10; position: relative;
    }
    .footer-hearts { display: flex; gap: 4px; }
    .heart-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 2px;
      transition: transform 0.15s;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .heart-btn:hover { transform: scale(1.25); }
    .heart-btn.active { animation: heartPop 0.35s ease; }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }
    .footer-text {
      font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 500;
    }

    /* ===== SEND BAR ===== */
    .send-bar { padding: 4px 12px 16px; z-index: 10; position: relative; }
    .send-input-row { display: flex; align-items: center; gap: 8px; }
    .send-input {
      flex: 1;
background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 8px 14px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .send-input::placeholder { color: rgba(255,255,255,0.5); }
    .send-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.18); }
    .btn-send {
      background: #1877f2; border: none; cursor: pointer;
      color: white; font-size: 16px; padding: 7px 10px;
      border-radius: 50%; transition: background 0.2s;
    }
    .btn-send:hover { background: #1461cc; }

    .tech-label {
      position: absolute; bottom: -28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 10px; white-space: nowrap;
    }
  </style>
</head>
<body>

<input type="file" id="avatarInput" accept="image/*">
<input type="file" id="photoInput1" accept="image/*" style="display:none">
<input type="file" id="photoInput2" accept="image/*" style="display:none">
