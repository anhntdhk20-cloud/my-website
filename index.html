<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Story Clone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone-frame {
      width: 360px;
      min-height: 640px;
      background: #0a0a1a;
      border-radius: 36px;
      border: 2px solid #2a2a4a;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      position: relative;
    }

    .story-bg {
      width: 100%;
      min-height: 640px;
      background: radial-gradient(ellipse at 20% 30%, #1b1b3a 0%, #0a0a1a 60%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0.6;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.9; } }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-area {
      display: flex; gap: 3px;
      padding: 12px 14px 4px;
      z-index: 10; position: relative;
    }
    .progress-segment {
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.35);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: white; border-radius: 2px; }
    .progress-segment:first-child .progress-fill { width: 100%; }
    .progress-segment:nth-child(2) .progress-fill { width: 40%; }
    .progress-segment:nth-child(3) .progress-fill { width: 0%; }

    /* ===== HEADER ===== */
    .story-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px 10px;
      z-index: 10;
      position: relative;
    }

    /* Avatar — click to upload */
    .avatar-wrapper {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid #1877f2;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }
    .avatar-wrapper:hover::after {
      content: '📷';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .avatar-wrapper img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .avatar-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1877f2, #42a5f5);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; font-weight: bold;
    }
    #avatarInput { display: none; }

    .header-info { flex: 1; min-width: 0; }
    .header-name {
      font-size: 13px; font-weight: 600; color: white;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-meta {
      font-size: 11px; color: rgba(255,255,255,0.7);
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
      white-space: nowrap; overflow: hidden;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: white; font-size: 18px; padding: 2px; opacity: 0.85;
    }
    .btn-icon:hover { opacity: 1; }

    /* ===== PHOTO CARDS ===== */
    .photos-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 4px 20px 8px;
      position: relative;
      z-index: 5;
    }

    .photo-card {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
      background: #2a5a2a;
      cursor: pointer;
    }
    .photo-card:hover .upload-hint { opacity: 1; }
    .upload-hint {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
      pointer-events: none;
    }

    .camo-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(ellipse 40px 30px at 10% 20%, #3a5a1a 0%, transparent 60%),
        radial-gradient(ellipse 60px 40px at 70% 10%, #5a7a2a 0%, transparent 60%),
        radial-gradient(ellipse 35px 50px at 30% 60%, #1a3a0a 0%, transparent 60%),
        radial-gradient(ellipse 50px 35px at 80% 70%, #4a6a1a 0%, transparent 60%),
        radial-gradient(ellipse 45px 45px at 50% 40%, #2a4a10 0%, transparent 60%),
        radial-gradient(ellipse 55px 30px at 15% 80%, #6a8a2a 0%, transparent 60%),
        radial-gradient(ellipse 30px 55px at 90% 30%, #3a5a1a 0%, transparent 60%),
        radial-gradient(ellipse 65px 25px at 55% 85%, #1a2a08 0%, transparent 60%);
      background-color: #4a6a2a;
      background-blend-mode: multiply;
    }

    .photo-placeholder {
      width: 100%;
      height: 155px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 30px;
    }

    /* Silhouette */
    .person-silhouette {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
    }
    .person-head {
      width: 42px; height: 42px;
      background: #f5c5a0;
      border-radius: 50%; position: relative; z-index: 2;
    }
    .person-hat {
      width: 52px; height: 22px;
      background: #556b2f;
      border-radius: 50% 50% 0 0 / 60% 60% 0 0;
      position: absolute; top: -14px; left: -5px; z-index: 3;
    }
    .person-hat::after {
      content: '';
      position: absolute;
      bottom: -4px; left: -4px; right: -4px;
      height: 8px; background: #4a5f25;
      border-radius: 0 0 4px 4px;
    }
    .person-body {
      width: 60px; height: 80px;
      background: #556b2f;
      border-radius: 8px 8px 0 0; margin-top: 2px;
    }
    .person-hair {
      position: absolute;
      width: 44px; height: 55px;
      background: #2c1a0e;
      border-radius: 50% 50% 40% 40%;
      top: -10px; left: -1px; z-index: 1;
    }
    .peace-hand {
      position: absolute; left: 25px; top: 50%;
      transform: translateY(-50%);
      z-index: 3; font-size: 26px;
      animation: waving 1.5s ease-in-out infinite alternate;
    }
    @keyframes waving {
      from { transform: translateY(-50%) rotate(-5deg); }
      to   { transform: translateY(-50%) rotate(5deg); }
    }

    /* ===== STICKERS ===== */
    .sticker { position: absolute; z-index: 20; pointer-events: none; }
    .sticker-butterfly {
      top: 70px; right: 10px; font-size: 36px;
      animation: flutter 2s ease-in-out infinite alternate;
      filter: hue-rotate(120deg) saturate(1.5);
    }
    @keyframes flutter {
      from { transform: rotate(-8deg) scale(1); }
      to   { transform: rotate(8deg) scale(1.1); }
    }
    .sticker-flower {
      top: 285px; left: 8px; font-size: 46px;
      animation: sway 3s ease-in-out infinite alternate;
      filter: hue-rotate(180deg) saturate(2);
    }
    @keyframes sway {
      from { transform: rotate(-6deg); }
      to   { transform: rotate(6deg); }
    }
    .sticker-sparkle { font-size: 22px; animation: sparkle-pulse 1.8s ease-in-out infinite alternate; }
    @keyframes sparkle-pulse {
      from { opacity: 0.5; transform: scale(0.85); }
      to   { opacity: 1;   transform: scale(1.15); }
    }
    .sp1 { top: 110px; left: 15px; font-size: 28px; }
    .sp2 { top: 215px; right: 18px; font-size: 18px; }
    .sp3 { top: 415px; left: 20px; font-size: 24px; }
    .sp4 { top: 480px; right: 22px; font-size: 16px; }

    /* ===== FOOTER — reactions ===== */
    .story-footer {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px 4px;
      z-index: 10; position: relative;
    }
    .footer-hearts { display: flex; gap: 4px; }
    .heart-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 2px;
      transition: transform 0.15s;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .heart-btn:hover { transform: scale(1.25); }
    .heart-btn.active { animation: heartPop 0.35s ease; }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }
    .footer-text {
      font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 500;
    }

    /* ===== SEND BAR ===== */
    .send-bar { padding: 4px 12px 16px; z-index: 10; position: relative; }
    .send-input-row { display: flex; align-items: center; gap: 8px; }
    .send-input {
      flex: 1;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 8px 14px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .send-input::placeholder { color: rgba(255,255,255,0.5); }
    .send-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.18); }
    .btn-send {
      background: #1877f2; border: none; cursor: pointer;
      color: white; font-size: 16px; padding: 7px 10px;
      border-radius: 50%; transition: background 0.2s;
    }
    .btn-send:hover { background: #1461cc; }

    .tech-label {
      position: absolute; bottom: -28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 10px; white-space: nowrap;
    }

    /* ===== MUSIC PANEL ===== */
    .music-panel {
      position: absolute;
      top: 56px; right: 10px;
      width: 230px;
      background: rgba(15,15,40,0.97);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 12px 14px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .music-panel.open { display: flex; }

    .music-panel-title {
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.9);
      display: flex; align-items: center; gap: 6px;
    }
    .music-panel-title span { font-size: 14px; }

    /* Upload zone */
    .music-upload-zone {
      border: 1.5px dashed rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .music-upload-zone:hover {
      border-color: #1877f2;
      color: #90c8ff;
      background: rgba(24,119,242,0.08);
    }
    .music-upload-zone .upload-icon { font-size: 20px; display: block; margin-bottom: 4px; }

    /* Now playing */
    .now-playing {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .now-playing.visible { display: flex; }

    .np-info {
      display: flex; align-items: center; gap: 8px;
    }
    .np-disc {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1877f2, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      animation: spin 4s linear infinite;
      animation-play-state: paused;
    }
    .np-disc.spinning { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .np-title {
      font-size: 11px; color: white; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 140px;
    }

    /* Progress */
    .np-progress-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .np-time { font-size: 10px; color: rgba(255,255,255,0.5); min-width: 30px; }
    .np-progress {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px; overflow: hidden; cursor: pointer;
    }
    .np-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1877f2, #a855f7);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s linear;
    }

    /* Controls */
    .np-controls {
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .np-btn {
      background: none; border: none; cursor: pointer;
      color: white; font-size: 16px; padding: 3px;
      opacity: 0.8; transition: opacity 0.15s, transform 0.15s;
    }
    .np-btn:hover { opacity: 1; transform: scale(1.15); }
    .np-btn.play-pause { font-size: 20px; opacity: 1; }

    /* Volume */
    .np-volume {
      display: flex; align-items: center; gap: 6px;
    }
    .np-vol-icon { font-size: 13px; color: rgba(255,255,255,0.6); }
    .np-vol-slider {
      flex: 1; -webkit-appearance: none;
      height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.2);
      outline: none; cursor: pointer;
    }
    .np-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: white; cursor: pointer;
    }

    /* Song name in header meta — scrolling marquee */
    .marquee-wrap { overflow: hidden; max-width: 170px; }
    .marquee-text {
      display: inline-block;
      white-space: nowrap;
      animation: marquee 8s linear infinite;
    }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      40%  { transform: translateX(-60%); }
      60%  { transform: translateX(-60%); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>

<input type="file" id="avatarInput" accept="image/*" style="display:none">
<input type="file" id="photoInput1" accept="image/*" style="display:none">
<input type="file" id="photoInput2" accept="image/*" style="display:none">
<input type="file" id="musicInput" accept="audio/*" style="display:none">
<audio id="audioPlayer"></audio>

<div style="position:relative;">
  <div class="phone-frame">
    <div class="story-bg" id="storyBg">

      <!-- Stickers -->
      <div class="sticker sticker-butterfly">🦋</div>
      <div class="sticker sticker-flower">🌸</div>
      <div class="sticker sticker-sparkle sp1">✦</div>
      <div class="sticker sticker-sparkle sp2">✦</div>
      <div class="sticker sticker-sparkle sp3">✦</div>
      <div class="sticker sticker-sparkle sp4">✦</div>

      <!-- Progress bars -->
      <div class="progress-bar-area">
        <div class="progress-segment"><div class="progress-fill"></div></div>
        <div class="progress-segment"><div class="progress-fill"></div></div>
        <div class="progress-segment"><div class="progress-fill"></div></div>
      </div>

      <!-- Header -->
      <div class="story-header">
        <!-- Avatar: click to upload -->
        <div class="avatar-wrapper" id="avatarBtn" title="Click để đổi ảnh đại diện">
          <div class="avatar-placeholder" id="avatarPlaceholder">H</div>
          <img id="avatarImg" src="" alt="" style="display:none;">
        </div>
        <div class="header-info">
          <div class="header-name">Đặng Thu Hà</div>
          <div class="header-meta">
            <span>🎵</span>
            <div class="marquee-wrap">
              <span class="marquee-text" id="metaSongName">Nguyễn Hùng, 30 Pictures · Ở Trong Khu Rừng</span>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="speakerBtn" title="Nhạc">🔊</button>
          <button class="btn-icon" id="globalPauseBtn">⏸</button>
          <button class="btn-icon" style="font-size:14px;letter-spacing:1px;">•••</button>
        </div>
      </div>

      <!-- Music Panel -->
      <div class="music-panel" id="musicPanel">
        <div class="music-panel-title"><span>🎵</span> Chọn nhạc</div>

        <div class="music-upload-zone" id="musicUploadZone">
          <span class="upload-icon">🎧</span>
          Click để tải nhạc lên<br>
          <span style="font-size:10px;opacity:0.6;">MP3, WAV, OGG...</span>
        </div>

        <div class="now-playing" id="nowPlaying">
          <div class="np-info">
            <div class="np-disc" id="npDisc">🎵</div>
            <div class="np-title" id="npTitle">Chưa có bài nào</div>
          </div>
          <div class="np-progress-wrap">
            <span class="np-time" id="npCurrent">0:00</span>
            <div class="np-progress" id="npProgressBar">
              <div class="np-progress-fill" id="npFill"></div>
            </div>
            <span class="np-time" id="npDuration">0:00</span>
          </div>
          <div class="np-controls">
            <button class="np-btn" id="btnRestart" title="Phát lại từ đầu">⏮</button>
            <button class="np-btn play-pause" id="btnPlayPause">▶️</button>
            <button class="np-btn" id="btnLoop" title="Lặp lại">🔁</button>
          </div>
          <div class="np-volume">
            <span class="np-vol-icon">🔈</span>
            <input type="range" class="np-vol-slider" id="volSlider" min="0" max="1" step="0.02" value="0.8">
            <span class="np-vol-icon">🔊</span>
          </div>
        </div>
      </div>

      <!-- Photos area -->
      <div class="photos-area">

        <div class="photo-card" id="card1" title="Click để thêm ảnh">
          <div class="upload-hint">📷 Thêm ảnh</div>
          <div class="camo-bg"></div>
          <div class="photo-placeholder" id="pp1">
            <div class="person-silhouette">
              <div style="position:relative;">
                <div class="person-hat"></div>
                <div class="person-hair"></div>
                <div class="person-head"></div>
              </div>
              <div class="person-body"></div>
            </div>
          </div>
        </div>

        <div class="photo-card" id="card2" title="Click để thêm ảnh">
          <div class="upload-hint">📷 Thêm ảnh</div>
          <div class="camo-bg"></div>
          <div class="photo-placeholder" id="pp2" style="position:relative;">
            <span class="peace-hand">✌️</span>
            <div class="person-silhouette">
              <div style="position:relative;">
                <div class="person-hat"></div>
                <div class="person-hair"></div>
                <div class="person-head" style="background:#f0b88a;"></div>
              </div>
              <div class="person-body"></div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer: reactions -->
      <div class="story-footer">
        <div class="footer-hearts">
          <button class="heart-btn" data-emoji="❤️" title="Thêm ❤️">❤️</button>
          <button class="heart-btn active" data-emoji="🧡" title="Thêm 🧡">🧡</button>
          <button class="heart-btn" data-emoji="💛" title="Thêm 💛" style="opacity:0.45;">💛</button>
          <button class="heart-btn" data-emoji="💜" title="Thêm 💜" style="opacity:0.45;">💜</button>
          <button class="heart-btn" data-emoji="💙" title="Thêm 💙" style="opacity:0.45;">💙</button>
        </div>
        <div class="footer-text">Đã gửi cho Hà</div>
      </div>

      <!-- Send bar -->
      <div class="send-bar">
        <div class="send-input-row">
          <input class="send-input" type="text" placeholder="Gửi tin nhắn..." id="msgInput" maxlength="120">
          <button class="btn-send" id="sendBtn">➤</button>
        </div>
      </div>

    </div>
  </div>
  <div class="tech-label">HTML · CSS · Vanilla JS — VSCode ready</div>
</div>

<script>
  /* ---- Stars ---- */
  const bg = document.getElementById('storyBg');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    bg.appendChild(s);
  }

  /* ---- Avatar upload ---- */
  const avatarInput = document.getElementById('avatarInput');
  document.getElementById('avatarBtn').addEventListener('click', () => avatarInput.click());
  avatarInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById('avatarImg');
    const ph  = document.getElementById('avatarPlaceholder');
    img.src = url;
    img.style.display = 'block';
    ph.style.display  = 'none';
  });

  /* ---- Photo card upload ---- */
  function setupCard(cardId, ppId, inputId) {
    const card  = document.getElementById(cardId);
    const pp    = document.getElementById(ppId);
    const input = document.getElementById(inputId);
    card.addEventListener('click', () => input.click());
    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      card.querySelector('.camo-bg')?.remove();
      pp.innerHTML = '';
      pp.style.cssText = `background:url('${url}') center/cover no-repeat;height:155px;width:100%;`;
      card.querySelector('.upload-hint').style.opacity = '0';
    });
  }
  setupCard('card1','pp1','photoInput1');
  setupCard('card2','pp2','photoInput2');

  /* ---- Heart reactions ---- */
  document.querySelectorAll('.heart-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const isActive = btn.classList.contains('active');
      btn.style.opacity = isActive ? '1' : '0.45';
      btn.classList.add('heartPop');
      setTimeout(() => btn.classList.remove('heartPop'), 400);
    });
  });

  /* ---- Send message ---- */
  const msgInput = document.getElementById('msgInput');
  const sendBtn  = document.getElementById('sendBtn');

  function sendMsg() {
    const text = msgInput.value.trim();
    if (!text) return;
    const footer = document.querySelector('.footer-text');
    footer.textContent = `Đã gửi: "${text}"`;
    msgInput.value = '';
    setTimeout(() => { footer.textContent = 'Đã gửi cho Hà'; }, 3000);
  }

  sendBtn.addEventListener('click', sendMsg);
  msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });

  /* ===== MUSIC PLAYER ===== */
  const audio        = document.getElementById('audioPlayer');
  const musicInput   = document.getElementById('musicInput');
  const musicPanel   = document.getElementById('musicPanel');
  const speakerBtn   = document.getElementById('speakerBtn');
  const globalPause  = document.getElementById('globalPauseBtn');
  const uploadZone   = document.getElementById('musicUploadZone');
  const nowPlaying   = document.getElementById('nowPlaying');
  const npDisc       = document.getElementById('npDisc');
  const npTitle      = document.getElementById('npTitle');
  const npFill       = document.getElementById('npFill');
  const npCurrent    = document.getElementById('npCurrent');
  const npDuration   = document.getElementById('npDuration');
  const btnPlayPause = document.getElementById('btnPlayPause');
  const btnRestart   = document.getElementById('btnRestart');
  const btnLoop      = document.getElementById('btnLoop');
  const volSlider    = document.getElementById('volSlider');
  const metaSong     = document.getElementById('metaSongName');

  let isLooping = false;
  audio.volume  = 0.8;

  // Toggle panel
  speakerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    musicPanel.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!musicPanel.contains(e.target) && e.target !== speakerBtn)
      musicPanel.classList.remove('open');
  });

  // Upload zone click
  uploadZone.addEventListener('click', () => musicInput.click());

  // Load music file
  musicInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    audio.src = url;
    const name = file.name.replace(/\.[^.]+$/, '');
    npTitle.textContent = name;
    metaSong.textContent = '🎵 ' + name;
    nowPlaying.classList.add('visible');
    audio.play();
    btnPlayPause.textContent = '⏸️';
    npDisc.classList.add('spinning');
    speakerBtn.textContent = '🔊';
  });

  // Format seconds → m:ss
  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  // Time update → progress bar
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    npFill.style.width = pct + '%';
    npCurrent.textContent = fmt(audio.currentTime);
    npDuration.textContent = fmt(audio.duration);
  });

  // Click on progress bar to seek
  document.getElementById('npProgressBar').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  });

  // Play/Pause button
  btnPlayPause.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      btnPlayPause.textContent = '⏸️';
      npDisc.classList.add('spinning');
    } else {
      audio.pause();
      btnPlayPause.textContent = '▶️';
      npDisc.classList.remove('spinning');
    }
  });

  // Global pause button in header
  globalPause.addEventListener('click', () => {
    if (audio.paused) { audio.play(); globalPause.textContent = '⏸'; btnPlayPause.textContent = '⏸️'; npDisc.classList.add('spinning'); }
    else              { audio.pause(); globalPause.textContent = '▶'; btnPlayPause.textContent = '▶️'; npDisc.classList.remove('spinning'); }
  });

  // Restart
  btnRestart.addEventListener('click', () => {
    audio.currentTime = 0;
    audio.play();
    btnPlayPause.textContent = '⏸️';
    npDisc.classList.add('spinning');
  });

  // Loop
  btnLoop.addEventListener('click', () => {
    isLooping = !isLooping;
    audio.loop = isLooping;
    btnLoop.style.opacity = isLooping ? '1' : '0.45';
    btnLoop.title = isLooping ? 'Đang lặp' : 'Lặp lại';
  });

  // Volume
  volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });

  // Song ended
  audio.addEventListener('ended', () => {
    if (!isLooping) {
      btnPlayPause.textContent = '▶️';
      npDisc.classList.remove('spinning');
    }
  });
</script>
</body>
</html>
